# ============================================================
# TrackTx — test_PE (Paired-End PRO-seq)
# ============================================================
# Sample: 10% subset of SRR12267707 (GSE154746 K562, Vihervaara lab)
#   - Paired-end layout
#   - Drosophila S2 spike-in (dm6)
#   - TruSeq small RNA adapters (trimming)
#   - UMI (7 nt at 5')
# First run: ./scripts/download_and_subset_test_data.sh PE
# Then: ./run_pipeline.sh --samplesheet test_PE/samplesheet_PE.csv --params-file test_PE/params_PE.yaml
# ============================================================

experiment_name: "TrackTx_test_PE"
samplesheet: "test_PE/samplesheet_PE.csv"
sample_source: "local"
paired_end: true
output_dir: "./results_test_PE"
control_label: "control"

# SRA download options
fastq_gzip: true
sra_tmp: null
sra_max_size: "20G"
sra_download_source: "auto"

# Reference genomes (hg38 + Drosophila dm6 spike-in)
reference_genome: "hs1"
genome_fasta: null
spikein_genome: "dm6"
spikein_fasta: null

# Directories
assets_dir: "${projectDir}/assets"
genome_cache: "${projectDir}/.cache/genomes"
force_rebuild: false
preprocess_reads_lenient_cache: false

gtf_path: ""
gtf_url: ""

# Annotation options
annotation_source: "refseq"
annotation_exclude_biotypes: ""
annotation_chr_naming: "none"

# Adapter trimming (TruSeq small RNA — GSE154746)
adapter_trimming:
  enabled: true
  preset: "illumina"
  adapter1: "TGGAATTCTCGGGTGCCAAGGAACTCCAGTCAC"
  adapter2: "GATCGTCGGACTGTAGAACTCTGAAC"
  minlen: 12

# Quality control
qc:
  enabled: true
fastqc_raw: true

# UMI processing (GSE154746: 5' UMI 6nt+C = 7 nt)
umi:
  enabled: true
  length: 7
  location: 5

# Barcode processing
barcode:
  enabled: false
  length: 0
  location: 5

# Output formats (bedgraph: true = publish bedGraphs; false saves ~100 MB)
output:
  cpm: true
  crpmsi: true
  raw_tracks: false
  bigwig: true
  bedgraph: true

# Storage (optional for testing - saves ~1.2 GB)
publish_trimmed_fastq: false
publish_alignments: false

# Normalization (siCPM uses spike-in)
norm:
  emit_bw: true
  emit_sicpm: true
  emit_allmap: true
  emit_5p: null

force_sort_bedgraph: false

# Polymerase metrics (no contrasts for single sample)
pol:
  contrasts: []
  top_n: 100
  plots: true

# Divergent transcription
advanced:
  cutadapt_extra: ""
  bowtie2_extra: ""
  divergent_threshold: auto
  divergent_sum_thr: auto
  divergent_fdr: 0.08
  divergent_calibration_percentile: 65
  divergent_calibration_sum_multiplier: 1.5
  divergent_calibration_background_lower: 0.01
  divergent_merge_gap: 150
  divergent_nt_window: 1000
  divergent_bin_gap: 100
  divergent_balance: 0.0
  divergent_qc: true

# Functional region geometry
functional_regions:
  tss_active_pm: 500
  prom_up: 500
  prom_down: 250
  tes_down: 500
  enhancer_up: 500
  enhancer_down: 500
